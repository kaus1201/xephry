 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Page</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #0070f3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>Hello World.</h1>
    </header>

    <main>
        <p>This is a minimalist static webpage. No frameworks, no bloat, just clean HTML and CSS.</p>
        
        <p>You can use this for:</p>
        <ul>
            <li>A personal landing page</li>
            <li>A simple blog post</li>
            <li>A digital business card</li>
        </ul>

        <p>Find more at <a href="#">yourlink.com</a>.</p>
    </main>

    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>

</body>
</html>
